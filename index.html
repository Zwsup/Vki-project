<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>easyBMI-project</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <h1 class="title">Basic BMI Calculator</h1>
    <div class="form-section">
        <div class="formm">
            <form>
            Cinsiyet: <br>
            <input type="radio" id="erkek" name="cinsiyet" value="Erkek">
            <label for="cinsiyet">Erkek</label> <br>
            <input type="radio" id="kadın" name="cinsiyet" value="Kadın">
            <label for="cinsiyet">Kadın</label> <br>
            <input type="radio" id="none" name="cinsiyet" value="Belirtmek istemiyorum">
            <label for="cinsiyet">Belirtmek istemiyorum</label>
            <br>
            <br>
            <br>
        
        
        
            
            Boy:
            <input type="number" id="boy"> Cm <br>
            <br>
            Yaş: <input type="number" id="yas"> <br>
            <br>

            Kilo:<input type="number" id="kilo"> Kg <br>
            <br>

            <input type="button" value="Hesapla" onclick="hesapla()">
            <input type="reset" value="Sıfırla">
            
            </form>

            <div id="sonuc"></div>
        </div>
    </div>
   



    <script src="assets/app.js"></script>
</body>
</html>
